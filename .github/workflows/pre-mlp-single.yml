# Reusable per-repo static analysis. Called by pre-mlp-static-analysis.yml for each UHP repo.
# Runs the full pre-mlp harness (FERPA, secrets, code quality) then tsc + lint.
#
# Step order:
#   1. Checkout target repo
#   2. Fetch harness script from UHP-OPS-Agent (skipped when self-checking)
#   3. Run python harness  -- FERPA gate, secrets, unprotected routes, as_any, etc.
#   4. Setup Node + npm ci
#   5. tsc --noEmit        -- TypeScript compile gate
#   6. npm run lint        -- ESLint gate
#   7. Unit tests           -- blocking (unless report_only=true)
#   8. E2E tests            -- warning-only for UHP-OPS-Agent (disabled by default)

name: Pre-MLP Single Repo Check

on:
  workflow_call:
    inputs:
      repo:
        description: Repository name under UHP-com
        required: true
        type: string
      ref:
        description: Git ref to check out
        required: true
        type: string
      report_only:
        description: Never fail, even on errors
        required: false
        type: boolean
        default: false
      run_e2e:
        description: Run E2E checks for UHP-OPS-Agent (disabled by default)
        required: false
        type: boolean
        default: false
    secrets:
      GH_ORG_TOKEN:
        required: false
        # Fine-grained PAT (UHP-com org): Contents: Read on uhp-student-app, uhp-field-execution,
        # and UHP-OPS-Agent. Recommended: store as a UHP-com org-level secret so it is available
        # to all caller repos without per-repo configuration.
        # Falls back to github.token for self-checks (UHP-OPS-Agent checking itself).

permissions:
  contents: read
  checks: write

jobs:
  check:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: UHP-com/${{ inputs.repo }}
          token: ${{ secrets.GH_ORG_TOKEN || github.token }}
          ref: ${{ inputs.ref }}

      # For cross-repo checks the harness script lives in UHP-OPS-Agent.
      # Shallow checkout (depth=1) into .pre-mlp-harness/.
      # Skipped when checking UHP-OPS-Agent itself (script already present).
      - name: Fetch pre-mlp harness
        if: ${{ inputs.repo != 'UHP-OPS-Agent' }}
        uses: actions/checkout@v4
        with:
          repository: UHP-com/UHP-OPS-Agent
          token: ${{ secrets.GH_ORG_TOKEN || github.token }}
          ref: staging
          path: .pre-mlp-harness
          fetch-depth: 1

      - name: Pre-MLP harness (FERPA, secrets, code quality)
        run: |
          SCRIPT="scripts/pre-mlp-check.py"
          [ -f "$SCRIPT" ] || SCRIPT=".pre-mlp-harness/scripts/pre-mlp-check.py"
          python3 "$SCRIPT" --score --repo-root .
        continue-on-error: ${{ inputs.report_only }}

      # Avoid cross-repo harness files being discovered by test runners.
      - name: Cleanup pre-mlp harness checkout
        if: ${{ inputs.repo != 'UHP-OPS-Agent' }}
        run: rm -rf .pre-mlp-harness

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        continue-on-error: ${{ inputs.report_only }}

      - name: Lint
        run: npm run lint --if-present
        env:
          CI: "true"
        continue-on-error: ${{ inputs.report_only }}

      # Unit tests are a gate by default. report_only=true converts them into
      # warning-only behavior for ad-hoc exploratory runs.
      - name: Unit tests
        run: npm run test:ci --if-present
        continue-on-error: ${{ inputs.report_only }}

      - name: Unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && hashFiles('test-results.xml') != ''
        with:
          files: test-results.xml
          check_name: "Unit Tests (${{ inputs.repo }})"
          comment_mode: off
          fail_on: test failures
          action_fail: "false"

      # E2E is intentionally non-blocking and disabled by default.
      # Re-enable by passing run_e2e=true in the workflow call.
      - name: E2E tests (warning-only)
        if: ${{ inputs.repo == 'UHP-OPS-Agent' && inputs.run_e2e }}
        run: PLAYWRIGHT_JUNIT_OUTPUT_NAME=e2e-test-results.xml npm run test:e2e --if-present -- --reporter=line,junit
        continue-on-error: true

      - name: E2E test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && inputs.repo == 'UHP-OPS-Agent' && inputs.run_e2e && hashFiles('e2e-test-results.xml') != ''
        with:
          files: e2e-test-results.xml
          check_name: "E2E Tests (${{ inputs.repo }})"
          comment_mode: off
          fail_on: test failures
          action_fail: "false"
